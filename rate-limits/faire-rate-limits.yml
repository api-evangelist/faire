description: Faire External API v2 enforces per-token rate limits and returns HTTP 429 with Retry-After
  when exceeded. Specific RPS thresholds are not openly published.
notes: Use pagination and webhooks to reduce polling.
sources:
- https://developers.faire.com/docs
responseCodes:
  throttled: 429
limits:
- name: Default External API
  scope: token
  metric: requests
  limit: not publicly documented
  notes: Honor 429 and Retry-After.
policies:
- name: Backoff Strategy
  description: Clients should implement exponential backoff with jitter and honor any Retry-After header.
